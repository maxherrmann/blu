name: CI

on:
    push:
        branches:
            - main
    pull_request:

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    validate:
        name: Lint, Test, and Build
        runs-on: ubuntu-latest

        steps:
            - name: Checkout changes
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "lts/*"
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

            - name: Test
              run: npm test

            - name: Build package
              run: npm run build
