name: Build and Publish

on:
    workflow_dispatch:
        inputs:
            versionTag:
                description: Version
                required: true
                type: string

concurrency:
    group: build-publish-${{ github.ref }}
    cancel-in-progress: false

permissions:
    contents: write
    id-token: write

jobs:
    build:
        name: Build and Publish
        runs-on: ubuntu-latest

        steps:
            - name: Checkout changes
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.ref }}

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "lts/*"
                  registry-url: https://registry.npmjs.org/
                  cache: npm

            - name: Update npm
              run: npm install --global npm@latest

            - name: Validate version
              env:
                  VERSION: ${{ github.event.inputs.versionTag }}
              run: |
                  if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]; then
                      echo "::error::Invalid version \"$VERSION\". Expected a semantic version like \"5.0.0\" or \"5.0.0-rc.1\"."
                      exit 1
                  fi

            - name: Install dependencies
              run: npm ci

            - name: Bump version to ${{ github.event.inputs.versionTag }}
              env:
                  VERSION: ${{ github.event.inputs.versionTag }}
              run: npm version "$VERSION" --allow-same-version --no-git-tag-version

            - name: Lint
              run: npm run lint

            - name: Test
              run: npm test

            - name: Build package
              run: npm run build

            - name: Publish package to NPM
              run: npm publish --access public

            - name: Commit and push changes
              uses: stefanzweifel/git-auto-commit-action@v7
              with:
                  commit_message: "Build ${{ github.event.inputs.versionTag }}"
                  tagging_message: ${{ github.event.inputs.versionTag }}
                  skip_fetch: true
                  skip_checkout: true

            - name: Create draft release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.event.inputs.versionTag }}
                  prerelease: ${{ contains(github.event.inputs.versionTag, '-rc.') }}
                  draft: true
                  body_path: .github/RELEASE_TEMPLATE.md
